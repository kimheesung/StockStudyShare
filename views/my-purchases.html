<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 구매내역 - StockStudyShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background: rgba(15, 12, 41, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #4f46e5, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .nav-item { padding: 8px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: all 0.3s; }
    .nav-item:hover { background: rgba(79,70,229,0.2); border-color: rgba(79,70,229,0.4); color: #fff; transform: translateY(-1px); }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(79,70,229,0.5); }
    .logout-btn { padding: 8px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 50px; color: #fff; text-decoration: none; font-size: 0.85rem; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
    h1 .highlight { background: linear-gradient(135deg, #4f46e5, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sub-text { color: rgba(255,255,255,0.5); margin-bottom: 30px; font-size: 0.9rem; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 32px; }
    th { text-align: left; padding: 12px 16px; font-size: 0.8rem; color: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.08); font-weight: 700; }
    td { padding: 14px 16px; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
    td a { color: #a5b4fc; text-decoration: none; }
    td a:hover { text-decoration: underline; }
    .btn-sm { padding: 6px 14px; background: linear-gradient(135deg, #4f46e5, #6366f1); border-radius: 20px; color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 700; }
    .empty-text { color: rgba(255,255,255,0.3); text-align: center; padding: 40px 0; }
    .shop-banner {
      display: flex; align-items: center; gap: 20px; padding: 24px 28px;
      background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(239,68,68,0.04));
      border: 1px solid rgba(245,158,11,0.2); border-radius: 18px;
      text-decoration: none; color: #fff; transition: all 0.3s;
    }
    .shop-banner:hover { transform: translateY(-2px); border-color: rgba(245,158,11,0.4); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .shop-banner-icon { font-size: 2.5rem; flex-shrink: 0; }
    .shop-banner-info { flex: 1; }
    .shop-banner-title { font-size: 1.1rem; font-weight: 900; color: #fbbf24; margin-bottom: 4px; }
    .shop-banner-desc { font-size: 0.82rem; color: rgba(255,255,255,0.4); line-height: 1.5; }
    .shop-banner-btn { padding: 8px 20px; background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 50px; font-size: 0.82rem; font-weight: 700; flex-shrink: 0; }

    @media (max-width: 768px) {
      nav { padding: 12px 16px; }
      .container { padding: 24px 16px; }
      h1 { font-size: 1.35rem; }
      .sub-text { font-size: 0.85rem; margin-bottom: 20px; }
      table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 24px; }
      th, td { padding: 10px 12px; font-size: 0.82rem; white-space: nowrap; }
      .shop-banner { flex-direction: column; text-align: center; padding: 20px 18px; gap: 14px; }
      .shop-banner-btn { align-self: center; }
    }
  </style>
</head>
<body>
  <nav>{{nav}}</nav>
  <div class="container">
    <h1><span class="highlight">내 구매</span>내역</h1>
    <p class="sub-text">총 {{totalCount}}건의 리포트를 구매했습니다.</p>

    <table>
      <thead>
        <tr>
          <th>리포트</th>
          <th>종목</th>
          <th>작성자</th>
          <th>가격</th>
          <th>구매일</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {{purchaseRows}}
      </tbody>
    </table>

    <a href="/my/shop" class="shop-banner">
      <div class="shop-banner-icon">🛒</div>
      <div class="shop-banner-info">
        <div class="shop-banner-title">상점</div>
        <div class="shop-banner-desc">광고 제거, 리포트 업로드 회피권 등 유용한 아이템을 포인트로 구매하세요.</div>
      </div>
      <div class="shop-banner-btn">상점 바로가기</div>
    </a>
  </div>
</body>
</html>
