<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리포트 올리기 - StockStudyShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff; min-height: 100vh;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 40px;
      background: rgba(15, 12, 41, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-link {
      color: rgba(255,255,255,0.6); text-decoration: none;
      font-size: 0.9rem; font-weight: 500; transition: color 0.3s;
    }
    .nav-link:hover, .nav-link.active { color: #fff; }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(79,70,229,0.5); }
    .user-area span { font-size: 0.9rem; }

    .container { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.5); text-decoration: none;
      font-size: 0.9rem; margin-bottom: 24px; transition: color 0.3s;
    }
    .back-link:hover { color: #fff; }
    .page-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
    .page-sub { color: rgba(255,255,255,0.5); margin-bottom: 36px; }

    .form-card {
      padding: 36px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
    }
    .form-section-title {
      font-size: 1.05rem; font-weight: 700;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
    }
    .form-group { margin-bottom: 24px; }
    .form-group label {
      display: block; font-size: 0.9rem; font-weight: 700;
      margin-bottom: 8px; color: rgba(255,255,255,0.8);
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%; padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: #fff;
      font-size: 0.95rem; font-family: 'Noto Sans KR', sans-serif;
      transition: border-color 0.3s; outline: none;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: rgba(79,70,229,0.5);
    }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .form-hint {
      font-size: 0.8rem; color: rgba(255,255,255,0.3); margin-top: 6px;
    }
    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }

    /* 파일 업로드 */
    .file-upload-area {
      position: relative;
      padding: 40px 20px;
      border: 2px dashed rgba(79,70,229,0.3);
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(79,70,229,0.05);
    }
    .file-upload-area:hover {
      border-color: rgba(79,70,229,0.6);
      background: rgba(79,70,229,0.1);
    }
    .file-upload-area input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
    }
    .file-upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .file-upload-text { font-size: 0.95rem; color: rgba(255,255,255,0.6); }
    .file-upload-text strong { color: #a5b4fc; }
    .file-upload-hint { font-size: 0.8rem; color: rgba(255,255,255,0.3); margin-top: 8px; }
    .file-name {
      margin-top: 12px; font-size: 0.9rem;
      color: #67e8f9; display: none;
    }

    .section-divider {
      margin: 32px 0;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .btn-submit {
      display: block; width: 100%; padding: 16px;
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      border: none; border-radius: 14px;
      color: #fff; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(6,182,212,0.3);
      margin-top: 8px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(6,182,212,0.5);
    }
  </style>
</head>
<body>
  <nav>
    <a href="/dashboard" class="logo">StockStudyShare</a>
    <div class="nav-links">
      <a href="/dashboard" class="nav-link">대시보드</a>
      <a href="/reports" class="nav-link active">리포트</a>
    </div>
    <div class="user-area">
      <img src="{{photo}}" alt="profile">
      <span>{{name}}</span>
    </div>
  </nav>

  <div class="container">
    <a href="/reports" class="back-link">← 리포트 목록으로</a>
    <h1 class="page-title">리포트 올리기</h1>
    <p class="page-sub">분석한 종목 리포트를 공유하고 함께 토론해보세요.</p>

    <div class="form-card">
      <form method="POST" action="/report-new" enctype="multipart/form-data">

        <div class="form-section-title">📄 리포트 파일</div>

        <div class="form-group">
          <div class="file-upload-area" id="dropZone">
            <input type="file" name="pdfFile" accept=".pdf" required id="fileInput">
            <div class="file-upload-icon">📎</div>
            <div class="file-upload-text"><strong>클릭</strong>하거나 파일을 드래그하세요</div>
            <div class="file-upload-hint">PDF 파일만 가능 (최대 20MB)</div>
            <div class="file-name" id="fileName"></div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>리포트 제목</label>
            <input type="text" name="title" placeholder="예: 삼성전자 2026년 실적 전망" required>
          </div>
          <div class="form-group">
            <label>종목명 / 티커</label>
            <input type="text" name="ticker" placeholder="예: 삼성전자 (005930)">
          </div>
        </div>

        <hr class="section-divider">
        <div class="form-section-title">📊 소개</div>

        <div class="form-group">
          <label>투자포인트</label>
          <textarea name="investmentPoint" placeholder="이 종목에 투자해야 하는 핵심 이유를 작성해주세요.&#10;&#10;예: AI 반도체 수요 급증에 따른 HBM 매출 성장, 파운드리 수율 개선으로 인한 마진 확대 기대" required></textarea>
        </div>

        <div class="form-group">
          <label>리스크</label>
          <textarea name="risk" placeholder="투자 시 고려해야 할 위험 요소를 작성해주세요.&#10;&#10;예: 미중 무역분쟁 심화 시 반도체 수출 규제 가능성, 경쟁사 대비 기술 격차 축소 우려" required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>기대 수익</label>
            <input type="text" name="expectedReturn" placeholder="예: +25%">
          </div>
          <div class="form-group">
            <label>목표 기간</label>
            <input type="text" name="returnReason" placeholder="예: 6개월">
            <p class="form-hint">기대 수익의 근거와 기간</p>
          </div>
        </div>

        <button type="submit" class="btn-submit">리포트 올리기</button>
      </form>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    fileInput.addEventListener('change', function() {
      if (this.files[0]) {
        fileName.textContent = '📎 ' + this.files[0].name;
        fileName.style.display = 'block';
      }
    });
  </script>
</body>
</html>
