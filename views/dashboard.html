<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockStudyShare - 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
    }
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 40px;
      background: rgba(15, 12, 41, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .user-area {
      display: flex; align-items: center; gap: 16px;
    }
    .user-area img {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(79,70,229,0.5);
    }
    .user-area span { font-size: 0.95rem; }
    .logout-btn {
      padding: 8px 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      transition: all 0.3s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.2); }
    .dashboard {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .welcome {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .welcome .highlight {
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub-text {
      color: rgba(255,255,255,0.5);
      margin-bottom: 40px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .card {
      padding: 32px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      transition: all 0.3s;
    }
    .card:hover {
      background: rgba(255,255,255,0.06);
      transform: translateY(-2px);
    }
    .card-icon { font-size: 2rem; margin-bottom: 16px; }
    .card h3 { margin-bottom: 8px; font-size: 1.1rem; }
    .card p { color: rgba(255,255,255,0.4); font-size: 0.9rem; line-height: 1.6; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">StockStudyShare</div>
    <div class="user-area">
      <img src="{{photo}}" alt="profile">
      <span>{{name}}</span>
      <a href="/logout" class="logout-btn">로그아웃</a>
    </div>
  </nav>
  <div class="dashboard">
    <h1 class="welcome">반갑습니다, <span class="highlight">{{name}}</span>님!</h1>
    <p class="sub-text">오늘도 함께 공부하고 함께 성장해요.</p>
    <div class="cards">
      <div class="card">
        <div class="card-icon">📚</div>
        <h3>내 스터디</h3>
        <p>참여 중인 스터디 그룹을 확인하고 새로운 스터디에 참여하세요.</p>
      </div>
      <div class="card">
        <div class="card-icon">📊</div>
        <h3>종목 분석</h3>
        <p>멤버들이 공유한 최신 종목 분석을 확인해보세요.</p>
      </div>
      <div class="card">
        <div class="card-icon">💬</div>
        <h3>토론방</h3>
        <p>시장 흐름에 대해 자유롭게 의견을 나눠보세요.</p>
      </div>
    </div>
  </div>
</body>
</html>
