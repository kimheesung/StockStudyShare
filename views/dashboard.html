<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockStudyShare - 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 40px;
      background: rgba(15, 12, 41, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-link {
      color: rgba(255,255,255,0.6);
      text-decoration: none; font-size: 0.9rem; font-weight: 500;
      transition: color 0.3s;
    }
    .nav-link:hover, .nav-link.active { color: #fff; }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(79,70,229,0.5);
    }
    .user-area span { font-size: 0.9rem; }
    .logout-btn {
      padding: 8px 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px; color: #fff;
      text-decoration: none; font-size: 0.85rem;
      transition: all 0.3s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.2); }

    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    .welcome { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
    .welcome .highlight {
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub-text { color: rgba(255,255,255,0.5); margin-bottom: 40px; }

    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .section-title { font-size: 1.3rem; font-weight: 700; }
    .btn-create {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border-radius: 50px; color: #fff;
      text-decoration: none; font-size: 0.9rem; font-weight: 700;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(79,70,229,0.3);
    }
    .btn-create:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(79,70,229,0.5);
    }
    .btn-create-alt {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      box-shadow: 0 4px 20px rgba(6,182,212,0.3);
    }
    .btn-create-alt:hover {
      box-shadow: 0 8px 30px rgba(6,182,212,0.5);
    }

    .study-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }
    .study-card {
      display: block; padding: 28px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      text-decoration: none; color: #fff;
      transition: all 0.3s;
      position: relative; overflow: hidden;
    }
    .study-card:hover {
      background: rgba(255,255,255,0.07);
      transform: translateY(-4px);
      border-color: rgba(79,70,229,0.3);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .card-category {
      display: inline-block; padding: 4px 12px;
      background: rgba(79,70,229,0.2);
      border: 1px solid rgba(79,70,229,0.3);
      border-radius: 20px; font-size: 0.75rem;
      color: #a5b4fc; margin-bottom: 14px;
    }
    .study-card h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 10px; }
    .card-desc {
      color: rgba(255,255,255,0.45);
      font-size: 0.88rem; line-height: 1.6; margin-bottom: 16px;
    }
    .card-meta {
      display: flex; gap: 16px;
      font-size: 0.8rem; color: rgba(255,255,255,0.4);
    }
    .badge-creator, .badge-member {
      position: absolute; top: 16px; right: 16px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 700;
    }
    .badge-creator {
      background: rgba(168,85,247,0.2); color: #c084fc;
      border: 1px solid rgba(168,85,247,0.3);
    }
    .badge-member {
      background: rgba(6,182,212,0.2); color: #67e8f9;
      border: 1px solid rgba(6,182,212,0.3);
    }

    /* 리포트 카드 */
    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .report-card {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      text-decoration: none; color: #fff;
      transition: all 0.3s;
    }
    .report-card:hover {
      background: rgba(255,255,255,0.07);
      transform: translateY(-3px);
      border-color: rgba(6,182,212,0.3);
      box-shadow: 0 6px 24px rgba(0,0,0,0.3);
    }
    .report-icon {
      font-size: 2rem;
      flex-shrink: 0;
    }
    .report-info { flex: 1; min-width: 0; }
    .report-info h3 {
      font-size: 1rem; font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .report-ticker {
      font-size: 0.8rem; color: #67e8f9; margin-bottom: 8px;
    }
    .report-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; color: rgba(255,255,255,0.4);
    }
    .report-author-img {
      width: 20px; height: 20px; border-radius: 50%;
    }
    .report-date { color: rgba(255,255,255,0.3); }

    .empty-text {
      color: rgba(255,255,255,0.3);
      font-size: 0.95rem;
      padding: 40px 0;
      text-align: center;
    }
    .see-all {
      display: inline-block; margin-top: 16px;
      color: #a5b4fc; text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    .see-all:hover { color: #fff; }
  </style>
</head>
<body>
  <nav>
    <a href="/dashboard" class="logo">StockStudyShare</a>
    <div class="nav-links">
      <a href="/dashboard" class="nav-link active">대시보드</a>
      <a href="/reports" class="nav-link">리포트</a>
    </div>
    <div class="user-area">
      <img src="{{photo}}" alt="profile">
      <span>{{name}}</span>
      <a href="/logout" class="logout-btn">로그아웃</a>
    </div>
  </nav>

  <div class="container">
    <h1 class="welcome">반갑습니다, <span class="highlight">{{name}}</span>님!</h1>
    <p class="sub-text">오늘도 함께 공부하고 함께 성장해요.</p>

    <div class="section-header">
      <h2 class="section-title">온라인 스터디</h2>
      <a href="/study-new" class="btn-create">+ 스터디 만들기</a>
    </div>
    <div class="study-grid">
      {{studyCards}}
    </div>

    <div class="section-header">
      <h2 class="section-title">최신 리포트</h2>
      <a href="/report-new" class="btn-create btn-create-alt">+ 리포트 올리기</a>
    </div>
    <div class="report-grid">
      {{reportCards}}
    </div>
    <div style="text-align:center; margin-top: 16px;">
      <a href="/reports" class="see-all">전체 리포트 보기 →</a>
    </div>
  </div>
</body>
</html>
