<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockStudyShare - 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background: rgba(15, 12, 41, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #4f46e5, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .nav-item { padding: 8px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: all 0.3s; }
    .nav-item:hover { background: rgba(79,70,229,0.2); border-color: rgba(79,70,229,0.4); color: #fff; transform: translateY(-1px); }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(79,70,229,0.5); }
    .logout-btn { padding: 8px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 50px; color: #fff; text-decoration: none; font-size: 0.85rem; }
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
    .section-title { font-size: 1.15rem; font-weight: 900; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title .icon { font-size: 1.2rem; }
    .updated { font-size: 0.72rem; color: rgba(255,255,255,0.25); margin-bottom: 24px; }

    /* 시장 지표 카드 */
    .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 36px; }
    .market-card { padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; }
    .market-card .name { font-size: 0.82rem; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
    .market-card .price { font-size: 1.2rem; font-weight: 900; }
    .market-card .change { font-size: 0.8rem; font-weight: 700; }
    .up { color: #ef4444; }
    .down { color: #3b82f6; }

    /* 투자자/신용 테이블 */
    .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 36px; }
    @media (max-width: 768px) { .data-grid { grid-template-columns: 1fr; } }
    .data-card { padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; }
    .data-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; color: rgba(255,255,255,0.7); }
    .data-card table { width: 100%; border-collapse: collapse; }
    .data-card th { text-align: left; padding: 8px 10px; font-size: 0.72rem; color: rgba(255,255,255,0.35); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .data-card td { padding: 8px 10px; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .investor-val { font-weight: 700; }
    .investor-val.up { color: #ef4444; }
    .investor-val.down { color: #3b82f6; }

    /* 리포트 카드 */
    .report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 36px; }
    .report-card { display: block; padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; text-decoration: none; color: #fff; transition: all 0.3s; }
    .report-card:hover { background: rgba(255,255,255,0.07); transform: translateY(-3px); border-color: rgba(79,70,229,0.3); }
    .report-card-top { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; gap: 6px; }
    .report-card-top-left { display: flex; align-items: center; gap: 6px; }
    .report-sector { font-size: 0.7rem; padding: 2px 8px; background: rgba(6,182,212,0.15); color: #67e8f9; border-radius: 10px; }
    .report-price { font-size: 0.8rem; font-weight: 700; color: #fbbf24; }
    .report-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .report-stock { font-size: 0.8rem; color: #67e8f9; margin-bottom: 6px; }
    .report-meta { display: flex; justify-content: space-between; font-size: 0.72rem; color: rgba(255,255,255,0.35); }
    .report-purchases { font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-top: 4px; }
    .report-empty { color: rgba(255,255,255,0.25); text-align: center; padding: 30px; font-size: 0.88rem; }

    /* 상승률 순위 */
    .gainer-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 36px; }
    .gainer-row { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; text-decoration: none; color: #fff; transition: all 0.2s; }
    .gainer-row:hover { background: rgba(255,255,255,0.06); }
    .gainer-rank { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 900; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); flex-shrink: 0; }
    .rank-1 { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .rank-2 { background: rgba(192,192,192,0.2); color: #c0c0c0; }
    .rank-3 { background: rgba(205,127,50,0.2); color: #cd7f32; }
    .gainer-info { flex: 1; min-width: 0; }
    .gainer-title { font-size: 0.88rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gainer-stock { font-size: 0.75rem; color: #67e8f9; }
    .gainer-author { font-size: 0.72rem; color: rgba(255,255,255,0.35); }
    .gainer-price-area { text-align: right; flex-shrink: 0; }
    .gainer-current { font-size: 0.9rem; font-weight: 700; }
    .gainer-base { font-size: 0.7rem; color: rgba(255,255,255,0.3); }
    .gainer-change { font-size: 0.85rem; font-weight: 900; }
    .change-arrow { font-size: 0.7rem; }

    .report-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .report-tab { padding: 12px 24px; background: none; border: none; border-bottom: 2px solid transparent; color: rgba(255,255,255,0.4); font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .report-tab:hover { color: rgba(255,255,255,0.7); }
    .report-tab.active { color: #fff; border-bottom-color: #6366f1; }
    .tag-owned { display: inline-block; padding: 2px 8px; background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); border-radius: 10px; font-size: 0.68rem; font-weight: 700; margin-left: 6px; }
    .report-tab-content { margin-bottom: 8px; }
    .see-all { display: inline-block; color: #a5b4fc; text-decoration: none; font-size: 0.85rem; margin-bottom: 36px; }
    .see-all:hover { color: #fff; }
  </style>
</head>
<body>
  <nav>{{nav}}</nav>
  <div class="container">

    <!-- 리포트 탭 -->
    <div class="report-tabs">
      <button class="report-tab active" onclick="switchTab('latest')">📝 최신</button>
      <button class="report-tab" onclick="switchTab('hot')">🔥 핫한</button>
      <button class="report-tab" onclick="switchTab('gainers')">🚀 상승률</button>
      <button class="report-tab" onclick="switchTab('follow')">⭐ 팔로우</button>
      <button class="report-tab" onclick="switchTab('topReturn')">💰 수익률 TOP</button>
    </div>
    <div class="report-tab-content" id="tab-latest">
      <div class="report-grid">{{latestCards}}</div>
    </div>
    <div class="report-tab-content" id="tab-hot" style="display:none">
      <div class="report-grid">{{hotCards}}</div>
    </div>
    <div class="report-tab-content" id="tab-gainers" style="display:none">
      <div class="report-grid">{{topGainersHtml}}</div>
    </div>
    <div class="report-tab-content" id="tab-follow" style="display:none">
      <div class="report-grid">{{followCards}}</div>
    </div>
    <div class="report-tab-content" id="tab-topReturn" style="display:none">
      <div class="report-grid">{{topReturnCards}}</div>
    </div>
    <a href="/reports" class="see-all">전체 리포트 보기 →</a>

    <!-- 광고 배너 -->
    <a href="/ad-inquiry" class="ad-box" id="ad-box" style="display:flex;align-items:center;justify-content:center;width:100%;height:90px;margin:20px 0;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:14px;text-decoration:none;color:rgba(255,255,255,0.3);overflow:hidden;transition:all 0.2s">
      <div id="ad-default" style="text-align:center"><span style="font-size:0.82rem;color:rgba(255,255,255,0.25)">광고 문의하기</span></div>
      <div id="ad-loaded" style="display:none;width:100%;height:100%"></div>
    </a>
    <script>(function(){fetch('/api/ads?position=dashboard').then(function(r){return r.json()}).then(function(a){if(a.length){var d=a[0],b=document.getElementById('ad-box'),df=document.getElementById('ad-default'),ld=document.getElementById('ad-loaded');if(d.image_url){ld.innerHTML='<img src="'+d.image_url+'" style="width:100%;height:100%;object-fit:cover;border-radius:14px">';if(d.link_url)b.href=d.link_url;b.target='_blank';df.style.display='none';ld.style.display='block';}}}).catch(function(){});})()</script>

    <!-- 시장 주요 지표 -->
    <h2 class="section-title"><span class="icon">📊</span> 시장 주요 지표</h2>
    <p class="updated">업데이트: {{updatedAt}}</p>
    <div class="market-grid" id="market-grid">
      {{marketCards}}
    </div>

    <!-- 투자자 매매동향 / 신용잔고 -->
    <div class="data-grid">
      <div class="data-card">
        <h3>투자자별 매매동향 (억원)</h3>
        <table>
          <thead><tr><th>날짜</th><th>개인</th><th>외국인</th><th>기관</th></tr></thead>
          <tbody>{{investorRows}}</tbody>
        </table>
      </div>
      <div class="data-card">
        <h3>신용잔고 (억원)</h3>
        <table>
          <thead><tr><th>날짜</th><th>신규</th><th>상환</th><th>잔고</th></tr></thead>
          <tbody>{{creditRows}}</tbody>
        </table>
      </div>
    </div>

  </div>
  <script>
    function switchTab(name) {
      document.querySelectorAll('.report-tab-content').forEach(function(el) { el.style.display = 'none'; });
      document.querySelectorAll('.report-tab').forEach(function(el) { el.classList.remove('active'); });
      document.getElementById('tab-' + name).style.display = 'block';
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
