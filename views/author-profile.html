<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{displayName}} - StockStudyShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #4f46e5, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-item { padding: 8px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 50px; color: #fff; text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: all 0.3s; }
    .nav-item:hover { background: rgba(79,70,229,0.2); border-color: rgba(79,70,229,0.4); color: #a5b4fc; transform: translateY(-1px); }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(79,70,229,0.5); }
    .logout-btn { padding: 8px 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 50px; color: #fff; text-decoration: none; font-size: 0.85rem; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .back-link { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; display: inline-block; }
    .back-link:hover { color: #fff; }
    .profile-card { padding: 32px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; margin-bottom: 32px; }
    .profile-top { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    .profile-top img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(79,70,229,0.5); object-fit: cover; }
    .profile-top-info { flex: 1; }
    .profile-top-info h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: 4px; }
    .profile-top-info .sectors { color: #67e8f9; font-size: 0.88rem; margin-bottom: 4px; }
    .profile-top-info .joined { color: rgba(255,255,255,0.3); font-size: 0.82rem; }
    .profile-stats { display: flex; gap: 0; margin-bottom: 20px; }
    .profile-stat { flex: 1; text-align: center; padding: 16px 0; border-right: 1px solid rgba(255,255,255,0.06); }
    .profile-stat:last-child { border-right: none; }
    .profile-stat .stat-val { font-size: 1.4rem; font-weight: 900; color: #fbbf24; }
    .profile-stat .stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .profile-bio { color: rgba(255,255,255,0.5); line-height: 1.7; font-size: 0.9rem; white-space: pre-wrap; }
    .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
  </style>
</head>
<body>
  <nav>{{nav}}</nav>
  <div class="container">
    <a href="/reports?view=authors" class="back-link">&larr; 리포터 목록</a>

    <div class="profile-card">
      <div class="profile-top">
        <img src="{{photo}}" alt="">
        <div class="profile-top-info">
          <h1>{{displayName}}</h1>
          <div class="sectors">{{sectors}}</div>
          <div class="joined">가입일: {{joinedAt}}</div>
        </div>
        {{followBtn}}
      </div>
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="stat-val" id="follower-count">{{followerCount}}</div>
          <div class="stat-label">팔로워</div>
        </div>
        <div class="profile-stat">
          <div class="stat-val">{{totalReports}}</div>
          <div class="stat-label">리포트</div>
        </div>
        <div class="profile-stat">
          <div class="stat-val">{{totalSales}}</div>
          <div class="stat-label">총 판매</div>
        </div>
      </div>
      <div class="profile-bio">{{bio}}</div>
    </div>

    <h2 class="section-title">리포트 ({{totalReports}}건)</h2>
    <div>
      {{reportCards}}
    </div>
  </div>

  <script>
    var authorId = '{{authorId}}';
    var isFollowing = '{{isFollowing}}' === 'true';

    function toggleFollow() {
      var url = isFollowing ? '/api/unfollow/' + authorId : '/api/follow/' + authorId;
      fetch(url, { method: 'POST' }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.ok) {
          isFollowing = data.followed;
          var btn = document.getElementById('follow-btn');
          if (data.followed) {
            btn.textContent = '팔로잉';
            btn.style.background = 'rgba(255,255,255,0.06)';
            btn.style.border = '1px solid rgba(255,255,255,0.15)';
            btn.style.color = 'rgba(255,255,255,0.6)';
          } else {
            btn.textContent = '팔로우';
            btn.style.background = 'linear-gradient(135deg,#4f46e5,#6366f1)';
            btn.style.border = 'none';
            btn.style.color = '#fff';
          }
          var countEl = document.getElementById('follower-count');
          var cur = parseInt(countEl.textContent) || 0;
          countEl.textContent = data.followed ? cur + 1 : Math.max(0, cur - 1);
        }
      });
    }
  </script>
</body>
</html>
