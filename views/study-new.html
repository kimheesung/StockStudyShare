<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스터디 만들기 - StockStudyShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 40px;
      background: rgba(15, 12, 41, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(79,70,229,0.5);
    }
    .user-area span { font-size: 0.9rem; }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.5);
      text-decoration: none; font-size: 0.9rem;
      margin-bottom: 24px;
      transition: color 0.3s;
    }
    .back-link:hover { color: #fff; }
    .page-title {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .page-sub {
      color: rgba(255,255,255,0.5);
      margin-bottom: 36px;
    }

    .form-card {
      padding: 36px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.8);
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-family: 'Noto Sans KR', sans-serif;
      transition: border-color 0.3s;
      outline: none;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: rgba(79,70,229,0.5);
    }
    .form-group textarea {
      min-height: 140px;
      resize: vertical;
    }
    .form-group select option {
      background: #1a1a2e;
      color: #fff;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-hint {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
      margin-top: 6px;
    }

    .btn-submit {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(79,70,229,0.3);
      margin-top: 8px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(79,70,229,0.5);
    }
  </style>
</head>
<body>
  <nav>
    <a href="/dashboard" class="logo">StockStudyShare</a>
    <div class="user-area">
      <img src="{{photo}}" alt="profile">
      <span>{{name}}</span>
    </div>
  </nav>

  <div class="container">
    <a href="/dashboard" class="back-link">← 스터디 목록으로</a>
    <h1 class="page-title">스터디 만들기</h1>
    <p class="page-sub">함께 공부할 동료를 모집해보세요.</p>

    <div class="form-card">
      <form method="POST" action="/study-new">
        <div class="form-group">
          <label>스터디 이름</label>
          <input type="text" name="title" placeholder="예: 미국 성장주 Deep Dive" required>
        </div>

        <div class="form-group">
          <label>소개</label>
          <textarea name="description" placeholder="스터디에서 어떤 것을 공부하는지, 어떤 방식으로 진행하는지 자유롭게 작성해주세요." required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>카테고리</label>
            <select name="category">
              <option value="국내주식">국내주식</option>
              <option value="해외주식">해외주식</option>
              <option value="기술적분석">기술적분석</option>
              <option value="가치투자">가치투자</option>
              <option value="배당투자">배당투자</option>
              <option value="ETF">ETF</option>
              <option value="암호화폐">암호화폐</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="form-group">
            <label>최대 인원</label>
            <input type="number" name="maxMembers" value="10" min="2" max="50">
          </div>
        </div>

        <div class="form-group">
          <label>일정</label>
          <input type="text" name="schedule" placeholder="예: 매주 토요일 오후 2시">
          <p class="form-hint">자유 형식으로 입력해주세요.</p>
        </div>

        <button type="submit" class="btn-submit">스터디 개설하기</button>
      </form>
    </div>
  </div>
</body>
</html>
