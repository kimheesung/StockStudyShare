<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - StockStudyShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 40px;
      background: rgba(15, 12, 41, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(79,70,229,0.5);
    }
    .user-area span { font-size: 0.9rem; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.5);
      text-decoration: none; font-size: 0.9rem;
      margin-bottom: 24px;
      transition: color 0.3s;
    }
    .back-link:hover { color: #fff; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .study-category {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(79,70,229,0.2);
      border: 1px solid rgba(79,70,229,0.3);
      border-radius: 20px;
      font-size: 0.85rem;
      color: #a5b4fc;
      margin-bottom: 16px;
    }
    .study-title {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 24px;
    }
    .study-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .info-card {
      padding: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
    }
    .info-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
    }
    .info-value { font-size: 1rem; font-weight: 700; }

    .study-description {
      padding: 32px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      margin-bottom: 32px;
    }
    .study-description h3 {
      font-size: 1.1rem;
      margin-bottom: 16px;
      color: rgba(255,255,255,0.8);
    }
    .study-description p {
      color: rgba(255,255,255,0.6);
      line-height: 1.8;
      font-size: 0.95rem;
    }

    .members-section {
      margin-bottom: 32px;
    }
    .members-section h3 {
      font-size: 1.1rem;
      margin-bottom: 16px;
    }
    .member-list {
      display: flex; flex-wrap: wrap; gap: 12px;
    }
    .member-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 50px;
      font-size: 0.85rem;
    }
    .member-item img {
      width: 28px; height: 28px; border-radius: 50%;
    }
    .empty-members {
      color: rgba(255,255,255,0.3);
      font-size: 0.9rem;
    }

    .action-area {
      text-align: center;
      padding: 20px 0;
    }
    .btn-action {
      display: inline-block;
      padding: 16px 48px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .btn-join {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #fff;
      box-shadow: 0 4px 20px rgba(79,70,229,0.4);
    }
    .btn-join:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(79,70,229,0.6);
    }
    .btn-leave {
      background: rgba(239,68,68,0.2);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.3);
    }
    .btn-leave:hover {
      background: rgba(239,68,68,0.3);
      transform: translateY(-2px);
    }
    .btn-disabled {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.3);
      cursor: default;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/dashboard" class="logo">StockStudyShare</a>
    <div class="user-area">
      <img src="{{photo}}" alt="profile">
      <span>{{name}}</span>
    </div>
  </nav>

  <div class="container">
    <a href="/dashboard" class="back-link">← 스터디 목록으로</a>

    <div class="study-category">{{category}}</div>
    <h1 class="study-title">{{title}}</h1>

    <div class="study-info">
      <div class="info-card">
        <div class="info-label">일정</div>
        <div class="info-value">{{schedule}}</div>
      </div>
      <div class="info-card">
        <div class="info-label">인원</div>
        <div class="info-value">{{memberCount}} / {{maxMembers}}명</div>
      </div>
      <div class="info-card">
        <div class="info-label">개설자</div>
        <div class="info-value">{{creatorName}}</div>
      </div>
    </div>

    <div class="study-description">
      <h3>스터디 소개</h3>
      <p>{{description}}</p>
    </div>

    <div class="members-section">
      <h3>참여 멤버</h3>
      <div class="member-list">
        {{memberList}}
      </div>
    </div>

    <div class="action-area">
      {{actionButton}}
    </div>
  </div>
</body>
</html>
