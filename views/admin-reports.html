<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리포트 검수 - StockStudyShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #4f46e5, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-item { padding: 8px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 50px; color: #fff; text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: all 0.3s; }
    .nav-item:hover { background: rgba(79,70,229,0.2); border-color: rgba(79,70,229,0.4); color: #a5b4fc; transform: translateY(-1px); }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(79,70,229,0.5); }
    .user-area span { font-size: 0.9rem; }
    .logout-btn { padding: 8px 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 50px; color: #fff; text-decoration: none; font-size: 0.85rem; }
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    h1 { font-size: 1.4rem; font-weight: 900; }
    .back-link { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #fff; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .filter-tab {
      padding: 8px 20px; border-radius: 50px; text-decoration: none; font-size: 0.85rem;
      background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.08);
    }
    .filter-tab.active { background: rgba(79,70,229,0.2); color: #a5b4fc; border-color: rgba(79,70,229,0.3); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 16px; font-size: 0.8rem; color: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.08); }
    td { padding: 14px 16px; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .btn-sm { padding: 6px 14px; background: linear-gradient(135deg, #4f46e5, #6366f1); border-radius: 20px; color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 700; }
    .empty-text { color: rgba(255,255,255,0.3); text-align: center; padding: 40px 0; }
    .count { color: rgba(255,255,255,0.3); font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav>{{nav}}</nav>
  <div class="container">
    <div class="header">
      <h1>리포트 검수</h1>
      <a href="/admin" class="back-link">&larr; 관리자 대시보드</a>
    </div>

    <div class="filter-tabs">
      <a href="/admin/reports?status=all" class="filter-tab">전체</a>
      <a href="/admin/reports?status=pending_admin" class="filter-tab">검수 대기</a>
      <a href="/admin/reports?status=on_sale" class="filter-tab">공개중</a>
      <a href="/admin/reports?status=study_published" class="filter-tab">스터디 공개</a>
      <a href="/admin/reports?status=rejected" class="filter-tab">반려됨</a>
      <a href="/admin/reports?status=suspended" class="filter-tab">공개중지</a>
      <a href="/admin/reports?status=draft" class="filter-tab">임시저장</a>
    </div>
    <p class="count">총 {{totalCount}}건</p>

    <table>
      <thead>
        <tr>
          <th>제목</th>
          <th>종목</th>
          <th>작성자</th>
          <th>공개범위</th>
          <th>상태</th>
          <th>가격</th>
          <th>판매</th>
          <th>제출일</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {{rows}}
      </tbody>
    </table>
  </div>

  <!-- 구매자 모달 -->
  <div id="buyers-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center" onclick="if(event.target===this)closeBuyers()">
    <div style="background: rgba(255,255,255,0.03);border: 1px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px;max-width:480px;width:90%;max-height:70vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 id="buyers-title" style="font-size:1.05rem;font-weight:900"></h3>
        <button onclick="closeBuyers()" style="background:none;border:none;color: rgba(255,255,255,0.4);font-size:1.2rem;cursor:pointer">&times;</button>
      </div>
      <div id="buyers-list" style="font-size:0.88rem"></div>
    </div>
  </div>

  <script>
    const status = '{{currentStatus}}';
    document.querySelectorAll('.filter-tab').forEach(tab => {
      if (tab.href.includes('status=' + status)) tab.classList.add('active');
    });

    function showBuyers(reportId, title) {
      document.getElementById('buyers-title').textContent = title + ' 구매자';
      document.getElementById('buyers-list').innerHTML = '<div style="text-align:center;color: rgba(255,255,255,0.3);padding:20px">불러오는 중...</div>';
      document.getElementById('buyers-overlay').style.display = 'flex';

      fetch('/admin/reports/' + reportId + '/buyers')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.buyers || data.buyers.length === 0) {
            document.getElementById('buyers-list').innerHTML = '<div style="text-align:center;color: rgba(255,255,255,0.3);padding:20px">구매자가 없습니다.</div>';
            return;
          }
          document.getElementById('buyers-list').innerHTML = data.buyers.map(function(b) {
            return '<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom: 1px solid rgba(255,255,255,0.08)">'
              + '<img src="' + (b.photo || '') + '" style="width:36px;height:36px;border-radius:50%;border: 1px solid rgba(255,255,255,0.08)">'
              + '<div style="flex:1">'
              + '<div style="font-weight:700;font-size:0.88rem">' + (b.nickname || b.name) + '</div>'
              + '<div style="font-size:0.75rem;color: rgba(255,255,255,0.3)">' + (b.email || '') + '</div>'
              + '</div>'
              + '<div style="text-align:right">'
              + '<div style="font-weight:700;color:#fbbf24;font-size:0.85rem">' + (b.amount === 0 ? '무료' : b.amount.toLocaleString() + 'P') + '</div>'
              + '<div style="font-size:0.7rem;color: rgba(255,255,255,0.3)">' + new Date(b.purchased_at).toLocaleDateString('ko-KR') + '</div>'
              + '</div></div>';
          }).join('');
        })
        .catch(function() {
          document.getElementById('buyers-list').innerHTML = '<div style="color:#ef4444;padding:20px;text-align:center">오류가 발생했습니다.</div>';
        });
    }
    function closeBuyers() { document.getElementById('buyers-overlay').style.display = 'none'; }
  </script>
</body>
</html>
