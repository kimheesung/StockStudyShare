<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>탐방노트 - StockStudyShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background: rgba(15,12,41,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #4f46e5, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
    h1 .highlight { background: linear-gradient(135deg, #f59e0b, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .sub-text { color: rgba(255,255,255,0.4); font-size: 0.9rem; }
    .btn-write {
      padding: 10px 24px; background: linear-gradient(135deg, #22c55e, #16a34a); border: none;
      border-radius: 50px; color: #fff; font-size: 0.88rem; font-weight: 700; text-decoration: none;
      transition: all 0.3s; box-shadow: 0 4px 16px rgba(34,197,94,0.3);
    }
    .btn-write:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34,197,94,0.5); }
    .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
    .filter-bar select, .filter-bar input {
      padding: 10px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; color: #fff; font-size: 0.9rem; font-family: inherit;
    }
    .filter-bar select option { background: #1a1a2e; }
    .filter-bar input::placeholder { color: rgba(255,255,255,0.3); }
    .filter-bar button {
      padding: 10px 20px; background: linear-gradient(135deg, #4f46e5, #6366f1); border: none;
      border-radius: 12px; color: #fff; font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }
    .note-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .note-card {
      display: block; padding: 24px 28px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
      text-decoration: none; color: #fff; transition: all 0.3s;
    }
    .note-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-3px); border-color: rgba(34,197,94,0.3); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .note-tags { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
    .tag-note { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); font-weight: 700; }
    .tag-market { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; background: rgba(79,70,229,0.2); color: #a5b4fc; border: 1px solid rgba(79,70,229,0.3); }
    .tag-sector { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; background: rgba(6,182,212,0.2); color: #67e8f9; border: 1px solid rgba(6,182,212,0.3); }
    .tag-purchased { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); font-weight: 700; }
    .note-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .note-stock { font-size: 0.85rem; color: #67e8f9; margin-bottom: 4px; }
    .note-visit-info { font-size: 0.8rem; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
    .note-summary { color: rgba(255,255,255,0.4); font-size: 0.88rem; line-height: 1.6; margin-bottom: 12px; }
    .note-meta { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: rgba(255,255,255,0.4); }
    .note-meta img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; }
    .note-price { color: #fbbf24; font-weight: 700; }
    .note-sales { color: rgba(255,255,255,0.3); font-size: 0.78rem; margin-top: 4px; }
    .empty-text { color: rgba(255,255,255,0.3); font-size: 0.95rem; padding: 60px 0; text-align: center; }
    .ad-box { display:flex;align-items:center;justify-content:center;width:100%;height:90px;margin:20px 0;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:14px;text-decoration:none;overflow:hidden;transition:all 0.2s }
  </style>
</head>
<body>
  <nav>{{nav}}</nav>
  <div class="container">
    <div class="page-header">
      <div>
        <h1><span class="highlight">탐방노트</span></h1>
        <p class="sub-text">기업 현장 탐방의 생생한 인사이트를 만나보세요.</p>
      </div>
      <a href="/visit-notes/new" class="btn-write">탐방노트 작성</a>
    </div>

    <form class="filter-bar" method="GET" action="/visit-notes">
      <select name="sector" onchange="this.form.submit()">
        <option value="">섹터 전체</option>
        <option value="IT/반도체" {{selIT}}>IT/반도체</option>
        <option value="바이오/헬스케어" {{selBio}}>바이오/헬스케어</option>
        <option value="금융" {{selFin}}>금융</option>
        <option value="소비재" {{selCon}}>소비재</option>
        <option value="에너지/소재" {{selEng}}>에너지/소재</option>
        <option value="산업재" {{selInd}}>산업재</option>
        <option value="기타" {{selEtc}}>기타</option>
      </select>
      <input type="text" name="q" placeholder="종목명/제목 검색..." value="{{currentQ}}">
      <button type="submit">검색</button>
    </form>

    <div class="note-grid">
      {{noteCards}}
    </div>

    <a href="/ad-inquiry" id="ad-box-vn" class="ad-box">
      <div id="ad-def-vn" style="text-align:center"><span style="font-size:0.82rem;color:rgba(255,255,255,0.25)">광고 문의하기</span></div>
      <div id="ad-img-vn" style="display:none;width:100%;height:100%"></div>
    </a>
    <script>(function(){fetch('/api/ads?position=dashboard').then(function(r){return r.json()}).then(function(a){if(a.length){var d=a[0],b=document.getElementById('ad-box-vn'),df=document.getElementById('ad-def-vn'),ld=document.getElementById('ad-img-vn');if(d.image_url){ld.innerHTML='<img src="'+d.image_url+'" style="width:100%;height:100%;object-fit:cover;border-radius:14px">';if(d.link_url)b.href=d.link_url;b.target='_blank';df.style.display='none';ld.style.display='block';}}}).catch(function(){});})()</script>
  </div>
</body>
</html>
