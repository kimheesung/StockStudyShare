<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockStudyShare - 리포트 작성</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #4f46e5, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-item { padding: 8px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 50px; color: #fff; text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: all 0.3s; }
    .nav-item:hover { background: rgba(79,70,229,0.2); border-color: rgba(79,70,229,0.4); color: #a5b4fc; transform: translateY(-1px); }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(79,70,229,0.5); }
    .user-area span { font-size: 0.9rem; }
    .logout-btn { padding: 8px 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 50px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.85rem; transition: all 0.3s; }
    .logout-btn:hover { background: rgba(255,255,255,0.08); }

    .blocked-container {
      max-width: 560px; margin: 120px auto; text-align: center; padding: 0 20px;
    }
    .blocked-icon {
      width: 100px; height: 100px; margin: 0 auto 32px;
      background: rgba(251, 191, 36, 0.1); border: 2px solid rgba(251, 191, 36, 0.2);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem;
    }
    .blocked-title {
      font-size: 1.5rem; font-weight: 900; margin-bottom: 16px;
    }
    .blocked-desc {
      font-size: 0.95rem; color: rgba(255,255,255,0.5); line-height: 1.7; margin-bottom: 40px;
    }
    .blocked-desc strong { color: #fbbf24; font-weight: 700; }
    .blocked-steps {
      text-align: left; margin-bottom: 40px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 28px 32px;
    }
    .blocked-steps h3 {
      font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-bottom: 20px; font-weight: 700;
    }
    .step {
      display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px;
    }
    .step:last-child { margin-bottom: 0; }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 900;
    }
    .step-text {
      font-size: 0.9rem; color: rgba(255,255,255,0.7); line-height: 1.6; padding-top: 3px;
    }
    .btn-primary {
      display: inline-block; padding: 14px 40px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border-radius: 50px; color: #fff; text-decoration: none;
      font-size: 1rem; font-weight: 700; transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(79,70,229,0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px); box-shadow: 0 8px 30px rgba(79,70,229,0.5);
    }
    .btn-secondary {
      display: inline-block; padding: 12px 28px; margin-left: 12px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px; color: rgba(255,255,255,0.7); text-decoration: none;
      font-size: 0.9rem; font-weight: 500; transition: all 0.3s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.06); color: #fff; }
  </style>
</head>
<body>
  <nav>{{nav}}</nav>
  <div class="blocked-container">
    <div class="blocked-icon">&#128221;</div>
    <h1 class="blocked-title">스터디 가입이 필요합니다</h1>
    <p class="blocked-desc">
      리포트를 작성하려면 <strong>스터디방에 먼저 가입</strong>해야 합니다.<br>
      스터디방에서 동료들과 함께 리서치하고, 리포트를 공유하세요.
    </p>
    <div class="blocked-steps">
      <h3>리포트 작성까지의 과정</h3>
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">스터디방 목록에서 관심 있는 스터디를 찾아 가입 신청</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">스터디장이 가입을 승인하면 스터디 멤버로 활동 시작</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">스터디방 내에서 리포트를 작성하고 멤버들과 공유</div>
      </div>
    </div>
    <a href="/study" class="btn-primary">스터디방 둘러보기</a>
    <a href="/dashboard" class="btn-secondary">대시보드로 돌아가기</a>
  </div>
</body>
</html>
