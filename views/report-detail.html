<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - StockStudyShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff; min-height: 100vh;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 40px;
      background: rgba(15, 12, 41, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-link {
      color: rgba(255,255,255,0.6); text-decoration: none;
      font-size: 0.9rem; font-weight: 500; transition: color 0.3s;
    }
    .nav-link:hover, .nav-link.active { color: #fff; }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(79,70,229,0.5); }
    .user-area span { font-size: 0.9rem; }

    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.5); text-decoration: none;
      font-size: 0.9rem; margin-bottom: 24px; transition: color 0.3s;
    }
    .back-link:hover { color: #fff; }

    .report-header { margin-bottom: 32px; }
    .report-ticker {
      display: inline-block; padding: 6px 16px;
      background: rgba(6,182,212,0.2);
      border: 1px solid rgba(6,182,212,0.3);
      border-radius: 20px; font-size: 0.85rem;
      color: #67e8f9; margin-bottom: 16px;
    }
    .report-title { font-size: 2rem; font-weight: 900; margin-bottom: 16px; }
    .report-author {
      display: flex; align-items: center; gap: 12px;
      color: rgba(255,255,255,0.5); font-size: 0.9rem;
    }
    .report-author img { width: 32px; height: 32px; border-radius: 50%; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .info-card {
      padding: 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
    }
    .info-label {
      font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 8px;
    }
    .info-value { font-size: 1rem; font-weight: 700; }
    .info-value.positive { color: #4ade80; }

    .section-card {
      padding: 32px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .section-card h3 {
      font-size: 1.05rem; font-weight: 700;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-card p {
      color: rgba(255,255,255,0.6);
      line-height: 1.8; font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .pdf-section {
      text-align: center;
      padding: 32px;
      background: rgba(79,70,229,0.05);
      border: 1px solid rgba(79,70,229,0.15);
      border-radius: 20px;
      margin-top: 32px;
    }
    .pdf-icon { font-size: 3rem; margin-bottom: 12px; }
    .pdf-title { font-size: 1rem; margin-bottom: 16px; color: rgba(255,255,255,0.6); }
    .btn-download {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 36px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border-radius: 50px; color: #fff;
      text-decoration: none; font-size: 1rem; font-weight: 700;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(79,70,229,0.3);
    }
    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(79,70,229,0.5);
    }
    .btn-view {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 36px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px; color: #fff;
      text-decoration: none; font-size: 1rem; font-weight: 700;
      transition: all 0.3s;
      margin-left: 12px;
    }
    .btn-view:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <nav>
    <a href="/dashboard" class="logo">StockStudyShare</a>
    <div class="nav-links">
      <a href="/dashboard" class="nav-link">대시보드</a>
      <a href="/reports" class="nav-link active">리포트</a>
    </div>
    <div class="user-area">
      <img src="{{photo}}" alt="profile">
      <span>{{name}}</span>
    </div>
  </nav>

  <div class="container">
    <a href="/reports" class="back-link">← 리포트 목록으로</a>

    <div class="report-header">
      <div class="report-ticker">{{ticker}}</div>
      <h1 class="report-title">{{title}}</h1>
      <div class="report-author">
        <img src="{{authorPhoto}}" alt="">
        <span>{{authorName}}</span>
        <span>·</span>
        <span>{{date}}</span>
      </div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="info-label">기대 수익</div>
        <div class="info-value positive">{{expectedReturn}}</div>
      </div>
      <div class="info-card">
        <div class="info-label">목표 기간</div>
        <div class="info-value">{{returnReason}}</div>
      </div>
    </div>

    <div class="section-card">
      <h3>💡 투자포인트</h3>
      <p>{{investmentPoint}}</p>
    </div>

    <div class="section-card">
      <h3>⚠️ 리스크</h3>
      <p>{{risk}}</p>
    </div>

    <div class="pdf-section">
      <div class="pdf-icon">📄</div>
      <p class="pdf-title">상세 분석 리포트 (PDF)</p>
      <a href="{{pdfUrl}}" target="_blank" class="btn-view">미리보기</a>
      <a href="/report/{{reportId}}/download" class="btn-download">다운로드</a>
    </div>
  </div>
</body>
</html>
