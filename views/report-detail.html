<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - StockStudyShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background: rgba(15, 12, 41, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #4f46e5, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .nav-item { padding: 8px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: all 0.3s; }
    .nav-item:hover { background: rgba(79,70,229,0.2); border-color: rgba(79,70,229,0.4); color: #fff; transform: translateY(-1px); }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(79,70,229,0.5); }
    .logout-btn { padding: 8px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 50px; color: #fff; text-decoration: none; font-size: 0.85rem; }

    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .back-link { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.9rem; margin-bottom: 24px; display: inline-block; }
    .back-link:hover { color: #fff; }

    .report-header { margin-bottom: 28px; }
    .report-tags { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .tag { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
    .tag-market { background: rgba(79,70,229,0.2); color: #a5b4fc; border: 1px solid rgba(79,70,229,0.3); }
    .tag-sector { background: rgba(6,182,212,0.2); color: #67e8f9; border: 1px solid rgba(6,182,212,0.3); }
    .tag-code { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); }
    .report-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; line-height: 1.3; }
    .report-stock { font-size: 1.1rem; color: #67e8f9; margin-bottom: 16px; font-weight: 700; }

    .author-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .author-row img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(79,70,229,0.3); }
    .author-info { flex: 1; }
    .author-name { font-weight: 700; font-size: 0.95rem; }
    .author-name a { color: #fff; text-decoration: none; }
    .author-name a:hover { color: #a5b4fc; }
    .author-bio { font-size: 0.78rem; color: rgba(255,255,255,0.4); }
    .author-date { font-size: 0.8rem; color: rgba(255,255,255,0.3); }
    .follow-btn { padding: 6px 18px; border-radius: 50px; font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; background: linear-gradient(135deg, #4f46e5, #6366f1); border: none; color: #fff; }
    .follow-btn:hover { transform: scale(1.05); }
    .follow-btn.following { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }
    .follow-btn.following:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #ef4444; }

    .price-box { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; background: rgba(79,70,229,0.08); border: 1px solid rgba(79,70,229,0.2); border-radius: 16px; margin-bottom: 28px; }
    .price-label { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
    .price-value { font-size: 1.5rem; font-weight: 900; color: #fbbf24; }
    .btn-primary { display: inline-block; padding: 12px 32px; background: linear-gradient(135deg, #4f46e5, #6366f1); border: none; border-radius: 50px; color: #fff; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; text-decoration: none; transition: all 0.3s; box-shadow: 0 4px 20px rgba(79,70,229,0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(79,70,229,0.5); }

    .summary-card { padding: 24px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; margin-bottom: 20px; }
    .summary-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 12px; color: #a5b4fc; }
    .summary-card p { color: rgba(255,255,255,0.6); line-height: 1.8; font-size: 0.92rem; white-space: pre-wrap; }

    .perf-section { padding: 20px 24px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; margin-bottom: 20px; }
    .perf-section h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; }
    .perf-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
    .perf-item { text-align: center; }
    .perf-label { font-size: 0.72rem; color: rgba(255,255,255,0.35); }
    .perf-val { font-size: 1rem; font-weight: 900; margin-top: 2px; }
    .perf-up { color: #ef4444; }
    .perf-down { color: #3b82f6; }

    .disclosure { padding: 16px 20px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.3); line-height: 1.6; }
    .flag-link { display: inline-block; margin-top: 12px; color: rgba(255,255,255,0.25); font-size: 0.78rem; text-decoration: none; }
    .flag-link:hover { color: #ef4444; }
  </style>
</head>
<body>
  <nav>{{nav}}</nav>
  <div class="container">
    <a href="/reports" class="back-link">&larr; 리포트 목록</a>

    <div class="report-header">
      <div class="report-tags">
        <span class="tag tag-market">{{marketType}}</span>
        <span class="tag tag-sector">{{sector}}</span>
        <span class="tag tag-code">{{stockCode}}</span>
      </div>
      <h1 class="report-title">{{title}}</h1>
      <div class="report-stock">{{stockName}}</div>
    </div>

    <div class="author-row">
      <img src="{{authorPhoto}}" alt="">
      <div class="author-info">
        <div class="author-name"><a href="/author-profile/{{authorId}}">{{authorName}}</a></div>
        <div class="author-bio">{{authorBio}}</div>
      </div>
      <div class="author-date">{{publishedAt}}</div>
      {{followButton}}
    </div>

    <div class="price-box">
      <div>
        <div class="price-label">가격</div>
        <div class="price-value">{{price}}</div>
      </div>
      {{actionButton}}
    </div>

    <div class="summary-card">
      <h3>요약</h3>
      <p>{{summary}}</p>
    </div>

    <!-- 수익률 (동적 로드) -->
    <div class="perf-section" id="perf-section" style="display:none">
      <h3>수익률</h3>
      <div class="perf-grid" id="perf-grid"></div>
    </div>

    <div class="disclosure">
      보유 여부: {{holdingDisclosure}} &middot; 이해충돌: {{conflictDisclosure}}
    </div>

    <a href="/reports/{{reportId}}/flag" class="flag-link">이 리포트 신고하기</a>
  </div>

  <script>
    // 수익률 동적 로드
    (function() {
      var reportId = '{{reportId}}';
      if (!reportId) return;
      fetch('/api/report-performance/' + reportId)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data || !data.entryPrice) return;
          var section = document.getElementById('perf-section');
          var grid = document.getElementById('perf-grid');
          section.style.display = 'block';

          var items = [
            { label: '기준가', val: Math.round(data.entryPrice).toLocaleString() + '원', cls: '' },
            { label: '현재가', val: data.currentPrice ? Math.round(data.currentPrice).toLocaleString() + '원' : '-', cls: '' },
          ];
          if (data.totalReturn !== null && data.totalReturn !== undefined) {
            var isUp = data.totalReturn >= 0;
            items.push({ label: '총 수익률', val: (isUp ? '+' : '') + data.totalReturn.toFixed(2) + '%', cls: isUp ? 'perf-up' : 'perf-down' });
          }
          if (data.periods) {
            var periodLabels = { '1w': '1주', '1m': '1개월', '3m': '3개월', '6m': '6개월', '1y': '1년' };
            for (var key in data.periods) {
              var v = data.periods[key];
              if (v !== null) {
                var up = v >= 0;
                items.push({ label: periodLabels[key] || key, val: (up ? '+' : '') + v.toFixed(2) + '%', cls: up ? 'perf-up' : 'perf-down' });
              }
            }
          }
          grid.innerHTML = items.map(function(item) {
            return '<div class="perf-item"><div class="perf-label">' + item.label + '</div><div class="perf-val ' + item.cls + '">' + item.val + '</div></div>';
          }).join('');
        }).catch(function() {});
    })();

    // 팔로우 토글
    function toggleFollow(btn) {
      var authorId = btn.dataset.authorId;
      var isFollowing = btn.classList.contains('following');
      var url = isFollowing ? '/api/unfollow/' + authorId : '/api/follow/' + authorId;
      fetch(url, { method: 'POST' }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.ok) {
          btn.classList.toggle('following', data.followed);
          btn.textContent = data.followed ? '팔로잉' : '팔로우';
        }
      });
    }
  </script>
</body>
</html>
