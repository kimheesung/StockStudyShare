<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리포트 - StockStudyShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff; min-height: 100vh;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 40px;
      background: rgba(15, 12, 41, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-link {
      color: rgba(255,255,255,0.6); text-decoration: none;
      font-size: 0.9rem; font-weight: 500; transition: color 0.3s;
    }
    .nav-link:hover, .nav-link.active { color: #fff; }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-area img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(79,70,229,0.5); }
    .user-area span { font-size: 0.9rem; }
    .logout-btn {
      padding: 8px 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px; color: #fff;
      text-decoration: none; font-size: 0.85rem;
      transition: all 0.3s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.2); }

    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    .page-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
    .page-sub { color: rgba(255,255,255,0.5); margin-bottom: 36px; }

    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .btn-create {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      border-radius: 50px; color: #fff;
      text-decoration: none; font-size: 0.9rem; font-weight: 700;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(6,182,212,0.3);
    }
    .btn-create:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(6,182,212,0.5);
    }

    .report-list { display: flex; flex-direction: column; gap: 16px; }
    .report-card-full {
      display: flex; align-items: center; gap: 20px;
      padding: 24px 28px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      text-decoration: none; color: #fff;
      transition: all 0.3s;
    }
    .report-card-full:hover {
      background: rgba(255,255,255,0.07);
      transform: translateY(-3px);
      border-color: rgba(6,182,212,0.3);
      box-shadow: 0 6px 24px rgba(0,0,0,0.3);
    }
    .report-icon-lg { font-size: 2.5rem; flex-shrink: 0; }
    .report-body { flex: 1; min-width: 0; }
    .report-card-category {
      display: inline-block; padding: 3px 10px;
      background: rgba(6,182,212,0.2);
      border: 1px solid rgba(6,182,212,0.3);
      border-radius: 20px; font-size: 0.75rem;
      color: #67e8f9; margin-bottom: 8px;
    }
    .report-body h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
    .report-summary {
      color: rgba(255,255,255,0.45);
      font-size: 0.88rem; line-height: 1.5; margin-bottom: 12px;
    }
    .report-meta-full {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: rgba(255,255,255,0.4);
    }
    .report-meta-full img { width: 22px; height: 22px; border-radius: 50%; }
    .dot { color: rgba(255,255,255,0.2); }

    .empty-text {
      color: rgba(255,255,255,0.3);
      font-size: 0.95rem; padding: 60px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/dashboard" class="logo">StockStudyShare</a>
    <div class="nav-links">
      <a href="/dashboard" class="nav-link">대시보드</a>
      <a href="/reports" class="nav-link active">리포트</a>
    </div>
    <div class="user-area">
      <img src="{{photo}}" alt="profile">
      <span>{{name}}</span>
      <a href="/logout" class="logout-btn">로그아웃</a>
    </div>
  </nav>

  <div class="container">
    <div class="section-header">
      <div>
        <h1 class="page-title">리포트</h1>
        <p class="page-sub">멤버들이 공유한 종목 분석 리포트</p>
      </div>
      <a href="/report-new" class="btn-create">+ 리포트 올리기</a>
    </div>

    <div class="report-list">
      {{reportCards}}
    </div>
  </div>
</body>
</html>
